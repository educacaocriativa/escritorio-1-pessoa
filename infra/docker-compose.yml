# Ambiente de desenvolvimento local. Em produção, ver docs/AWS-DEPLOYMENT.md.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: e1pdb
      POSTGRES_USER: e1puser
      POSTGRES_PASSWORD: e1ppass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Demove o usuário da app a NÃO-superusuário p/ que a RLS valha (ver script).
      # DESATIVADO: bind mount de caminho em SSD externo com espaço ("Extreme SSD") quebra o
      # file-sharing do Docker Desktop no macOS (mkdir /host_mnt/Volumes/Extreme SSD: file exists).
      # O script initdb só roda no PRIMEIRO boot (data dir vazio); o papel e1p_app já está no volume.
      # Para reabilitar num setup limpo (ou em caminho sem espaço), descomente a linha abaixo.
      # - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e1puser -d e1pdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ../apps/api
    restart: unless-stopped
    environment:
      # App conecta como papel NÃO-superusuário (e1p_app) p/ a RLS valer. Ver initdb/01-rls-enforce.sql.
      DATABASE_URL: postgresql+psycopg://e1p_app:e1ppass@postgres:5432/e1pdb
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # Roda migrations e sobe a API.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    # Contexto = raiz do monorepo (o Dockerfile precisa de packages/ e pnpm-workspace.yaml).
    # Build de PRODUÇÃO (nginx estático, SEM proxy /api). Em DEV o front é o Vite (`pnpm dev`)
    # na 5173, que faz proxy /api -> :8000. Por isso este container NÃO usa a 5173: senão ele
    # roubaria a porta do Vite ao subir e a app "cairia" (chamadas /api voltariam como HTML).
    # Acesse o build de produção em http://localhost:8081 quando quiser testá-lo.
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  postgres_data:
